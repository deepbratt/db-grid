services:
  postgres:
    image: postgres:16-alpine
    container_name: db-grid-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: dbgrid
      POSTGRES_PASSWORD: dbgrid_secret
      POSTGRES_DB: db_grid
    volumes:
      - db_grid_pg_data:/var/lib/postgresql/data
      - ./apps/api/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbgrid -d db_grid"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_grid_pg_data:
